name: Daily Employment Law Scrape

on:
  schedule:
    # Runs every day at 7:00 AM Eastern (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:  # Allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit updated JSON files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data files
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name  "Employment Law Bot"
          git config --global user.email "bot@itsovertime.com"
          git add data/
          git commit -m "chore: daily law update $(date +%Y-%m-%d)"
          git push
