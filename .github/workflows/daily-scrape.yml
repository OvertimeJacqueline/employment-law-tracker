name: Daily Employment Law Scrape

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 \
                      google-api-python-client google-auth google-auth-oauthlib

      - name: Run RSS scraper
        run: python scripts/scraper.py

      - name: Run Mineral email parser
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/mineral_email_parser.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data files
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name  "Employment Law Bot"
          git config --global user.email "bot@itsovertime.com"
          git add data/
          git commit -m "chore: daily law update $(date +%Y-%m-%d)"
          git push
